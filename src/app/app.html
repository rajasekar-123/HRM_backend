<div class="app-layout">

  <!-- SIDEBAR -->
  <app-sidebar
    class="app-sidebar"
    [class.open]="mobile"
    (linkClick)="closesidebar()">
  </app-sidebar>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- HEADER -->
    <app-header (menuClick)="togglesidebar()"></app-header>

    <!-- ROUTER CONTENT -->
    <div class="p-3">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>

<!-- BACKDROP (mobile only) -->
<div
  class="sidebar-backdrop"
  *ngIf="mobile"
  (click)="closesidebar()">
</div>
