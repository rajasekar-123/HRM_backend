<div class="report-content">


  <div class="mb-4">
    <h3>Reports & Analytics</h3>
    <p class="text-muted">Monthly HR & Payroll insights</p>
  </div>


  <div class="row g-3 mb-4">
    <div class="col-12 col-sm-6 col-lg-3">
      <div class="stat-card">
        <p>Avg Attendance</p>
        <h2>93%</h2>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="stat-card">
        <p>Total Payroll</p>
        <h2>₹5,00,000</h2>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="stat-card">
        <p>New Hires</p>
        <h2>3</h2>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-3">
      <div class="stat-card">
        <p>Attrition Rate</p>
        <h2>2.1%</h2>
      </div>
    </div>
  </div>


  <div class="row g-3 mb-4">

    <div class="col-12 col-lg-6">
      <div class="card custom-card p-3">
        <h6 class="mb-3">Attendance Trend</h6>
        <canvas id="attendanceAnalytics"></canvas>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card custom-card p-3">
        <h6 class="mb-3">Department Payroll</h6>
        <canvas id="payrollAnalytics"></canvas>
      </div>
    </div>

  </div>


  <div class="card custom-card">
    <div class="card-header">Generated Reports</div>

    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
          <tr>
            <th>Report Name</th>
            <th>Type</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

       <tbody>
  <tr *ngFor="let r of reports">
    <td data-label="Report Name">{{ r.name }}</td>
    <td data-label="Type">{{ r.type }}</td>
    <td data-label="Status">
      <span
        class="badge"
        [ngClass]="{
          'bg-success': r.status === 'Ready',
          'bg-warning': r.status === 'Generating'
        }">
        {{ r.status }}
      </span>
    </td>
    <td data-label="Action" class="action-cell">
  <button
    class="btn btn-sm btn-outline-primary w-100 download-btn"
    [disabled]="r.status !== 'Ready'">
    ⬇ Download Report
  </button>
</td>

  </tr>
</tbody>


      </table>
    </div>
  </div>

</div>
